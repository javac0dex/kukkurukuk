<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Event</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* KELOLA EVENT SECTION */
        .event-manager {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #ff6b35;
        }

        .event-manager h2 {
            color: #ff6b35;
            margin-bottom: 25px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-display {
            background: #1a1a2e;
            border: 2px solid #ff6b35;
            color: #ff6b35;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #b0b0b0;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0f3460;
            border: 1px solid #ff6b35;
            color: #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff8c5a;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 22px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: #ff6b35;
            color: white;
        }

        .btn-save:hover {
            background: #ff8c5a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
        }

        .btn-delete {
            background: transparent;
            color: #ff6b35;
            border: 2px solid #ff6b35;
        }

        .btn-delete:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: #ff8c5a;
            color: #ff8c5a;
        }

        .btn-clear {
            background: #2a2a3e;
            color: #888;
            border: 1px solid #444;
        }

        .btn-clear:hover {
            background: #3a3a4e;
            color: #aaa;
        }

        /* EVENT LIST SECTION */
        .event-list {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #ff6b35;
        }

        .event-list h2 {
            color: #ff6b35;
            margin-bottom: 25px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .event-item {
            background: rgba(15, 52, 96, 0.6);
            border-left: 4px solid #ff6b35;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .event-item:hover {
            background: rgba(15, 52, 96, 0.9);
            border-left-color: #ff8c5a;
        }

        .event-date {
            color: #ff6b35;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .event-title {
            color: #e0e0e0;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .event-link {
            color: #888;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 12px;
        }

        .event-button {
            display: inline-block;
            background: #ff6b35;
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .event-button:hover {
            background: #ff8c5a;
            transform: translateY(-2px);
        }

        .no-events {
            text-align: center;
            color: #666;
            padding: 30px 20px;
            font-size: 13px;
        }

        /* CALENDAR SECTION */
        .calendar-section {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #ff6b35;
        }

        .calendar-section h2 {
            color: #ff6b35;
            margin-bottom: 25px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }

        .calendar-header button {
            background: #ff6b35;
            color: white;
            padding: 8px 14px;
            font-size: 12px;
        }

        .calendar-header button:hover {
            background: #ff8c5a;
        }

        .current-month {
            color: #ff6b35;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day-header {
            background: #0f3460;
            color: #ff6b35;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            border-radius: 6px;
        }

        .calendar-day {
            background: #0f3460;
            border: 1px solid #2a5a8f;
            padding: 12px 8px;
            min-height: 90px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .calendar-day:hover {
            background: #1a4a7f;
            border-color: #ff6b35;
        }

        .calendar-day.other-month {
            color: #555;
        }

        .calendar-day.has-event {
            background: rgba(255, 107, 53, 0.1);
            border-color: #ff6b35;
        }

        .calendar-day.has-event .day-number {
            color: #ff6b35;
            font-weight: bold;
        }

        .day-number {
            color: #e0e0e0;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .day-event-title {
            font-size: 10px;
            color: #ff6b35;
            margin-top: 4px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-dot {
            width: 5px;
            height: 5px;
            background: #ff6b35;
            border-radius: 50%;
            display: inline-block;
            margin-right: 3px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .calendar-section {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- KELOLA EVENT -->
        <div class="event-manager">
            <h2>Kelola Event</h2>
            <div class="date-display" id="dateDisplay">Minggu, 26 April 2026</div>

            <div class="form-group">
                <label for="eventDate">PILIH TANGGAL</label>
                <input type="date" id="eventDate">
            </div>

            <div class="form-group">
                <label for="eventTitle">JUDUL EVENT</label>
                <input type="text" id="eventTitle" placeholder="Contoh: Cara Meminum Ramune">
            </div>

            <div class="form-group">
                <label for="eventLink">LINK DIRECT</label>
                <input type="url" id="eventLink" placeholder="http://yup48.online/admin/testing/">
            </div>

            <div class="form-group">
                <label for="eventButton">TEKS TOMBOL</label>
                <input type="text" id="eventButton" placeholder="Contoh: Stream disini">
            </div>

            <div class="button-group">
                <button class="btn-save" onclick="saveEvent()">SIMPAN EVENT</button>
                <button class="btn-delete" onclick="deleteEvent()">HAPUS EVENT</button>
                <button class="btn-clear" onclick="clearForm()">CLEAR ALL</button>
            </div>
        </div>

        <!-- DAFTAR EVENT -->
        <div class="event-list">
            <h2>Daftar Event</h2>
            <div id="eventListContainer">
                <div class="no-events">Belum ada event</div>
            </div>
        </div>

        <!-- KALENDER -->
        <div class="calendar-section">
            <h2>Kalender Event</h2>
            <div class="calendar-header">
                <button onclick="prevMonth()">← BULAN LALU</button>
                <div class="current-month" id="monthDisplay"></div>
                <button onclick="nextMonth()">BULAN DEPAN →</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <script>
        // DATA EVENT - TAMBAHKAN EVENT DI SINI
        let events = [
            {
                date: '2026-04-26',
                title: 'Cara Meminum Ramune',
                link: 'http://yup48.online/admin/testing/',
                buttonText: 'Stream disini'
            },
            {
                date: '2026-04-03',
                title: 'werf',
                link: 'asdfdf',
                buttonText: 'Batu'
            }
        ];

        let currentDate = new Date(2026, 3, 26); // April 26, 2026
        let selectedDate = null;

        // Nama hari dan bulan
        const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                           'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        // Format tanggal ke YYYY-MM-DD
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Format tanggal display
        function formatDisplayDate(dateString) {
            const [year, month, day] = dateString.split('-');
            const date = new Date(year, month - 1, day);
            return `${dayNames[date.getDay()]}, ${day} ${monthNames[date.getMonth()]} ${year}`;
        }

        // Set tanggal input saat dipilih
        document.getElementById('eventDate').addEventListener('change', function() {
            selectedDate = this.value;
            document.getElementById('dateDisplay').textContent = formatDisplayDate(selectedDate);
        });

        // Simpan event
        function saveEvent() {
            const date = selectedDate || document.getElementById('eventDate').value;
            const title = document.getElementById('eventTitle').value.trim();
            const link = document.getElementById('eventLink').value.trim();
            const buttonText = document.getElementById('eventButton').value.trim();

            if (!date || !title || !link || !buttonText) {
                alert('Mohon lengkapi semua field!');
                return;
            }

            // Cek apakah event sudah ada
            const existingIndex = events.findIndex(e => e.date === date);
            if (existingIndex >= 0) {
                events[existingIndex] = { date, title, link, buttonText };
            } else {
                events.push({ date, title, link, buttonText });
            }

            // Sort events by date
            events.sort((a, b) => new Date(a.date) - new Date(b.date));

            clearForm();
            renderEventList();
            renderCalendar();
        }

        // Hapus event
        function deleteEvent() {
            const date = selectedDate || document.getElementById('eventDate').value;
            if (!date) {
                alert('Pilih tanggal event yang ingin dihapus!');
                return;
            }

            events = events.filter(e => e.date !== date);
            clearForm();
            renderEventList();
            renderCalendar();
        }

        // Clear form
        function clearForm() {
            document.getElementById('eventDate').value = '';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventLink').value = '';
            document.getElementById('eventButton').value = '';
            selectedDate = null;
            document.getElementById('dateDisplay').textContent = formatDisplayDate(formatDate(new Date(2026, 3, 26)));
        }

        // Render daftar event
        function renderEventList() {
            const container = document.getElementById('eventListContainer');
            
            if (events.length === 0) {
                container.innerHTML = '<div class="no-events">Belum ada event</div>';
                return;
            }

            container.innerHTML = events.map(event => {
                const [year, month, day] = event.date.split('-');
                const dateObj = new Date(year, month - 1, day);
                const dateStr = `${dayNames[dateObj.getDay()].toUpperCase().substring(0, 3)} ${day} ${monthNames[month - 1].toUpperCase().substring(0, 3)} ${year}`.toUpperCase();

                return `
                    <div class="event-item">
                        <div class="event-date">${dateStr}</div>
                        <div class="event-title">${event.title}</div>
                        <div class="event-link">${event.link}</div>
                        <a href="${event.link}" target="_blank" class="event-button">${event.buttonText}</a>
                    </div>
                `;
            }).join('');
        }

        // Render kalender
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthDisplay = document.getElementById('monthDisplay');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthDisplay.textContent = `${monthNames[month]} ${year}`;
            
            // Hari minggu header
            const dayHeaders = ['MIN', 'SEN', 'SEL', 'RAB', 'KAM', 'JUM', 'SAB'];
            let html = dayHeaders.map(day => `<div class="calendar-day-header">${day}</div>`).join('');
            
            // Tanggal bulan sebelumnya
            const firstDay = new Date(year, month, 1).getDay();
            const lastDayPrevMonth = new Date(year, month, 0).getDate();
            
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = lastDayPrevMonth - i;
                html += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
            }
            
            // Tanggal bulan ini
            const lastDay = new Date(year, month + 1, 0).getDate();
            
            for (let day = 1; day <= lastDay; day++) {
                const dateStr = formatDate(new Date(year, month, day));
                const hasEvent = events.some(e => e.date === dateStr);
                
                let className = 'calendar-day';
                if (hasEvent) className += ' has-event';
                
                let eventIndicator = '';
                const event = events.find(e => e.date === dateStr);
                if (event) {
                    eventIndicator = `<div class="day-event-title"><span class="event-dot"></span>${event.title.substring(0, 15)}</div>`;
                }
                
                html += `
                    <div class="${className}" onclick="selectDateFromCalendar('${dateStr}')">
                        <div class="day-number">${day}</div>
                        ${eventIndicator}
                    </div>
                `;
            }
            
            // Tanggal bulan depan
            const totalCells = Math.ceil((firstDay + lastDay) / 7) * 7;
            for (let day = 1; day <= totalCells - firstDay - lastDay; day++) {
                html += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
            }
            
            grid.innerHTML = html;
        }

        // Pilih tanggal dari kalender
        function selectDateFromCalendar(dateStr) {
            selectedDate = dateStr;
            document.getElementById('eventDate').value = dateStr;
            document.getElementById('dateDisplay').textContent = formatDisplayDate(dateStr);

            const event = events.find(e => e.date === dateStr);
            if (event) {
                document.getElementById('eventTitle').value = event.title;
                document.getElementById('eventLink').value = event.link;
                document.getElementById('eventButton').value = event.buttonText;
            } else {
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventLink').value = '';
                document.getElementById('eventButton').value = '';
            }
        }

        // Navigasi bulan
        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // Inisialisasi
        window.addEventListener('load', function() {
            renderEventList();
            renderCalendar();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replay Theater by Gemes.in</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');

        body {
            font-family: "Atkinson Hyperlegible", sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* CSS yang kamu kirimkan */
        .replay-layout { min-height: 0; }
        .replay-sidebar {
            min-height: 0;
            max-height: min(70vh, 760px);
            overflow: hidden;
        }
        .replay-list {
            min-height: 0;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: rgba(239, 68, 68, 0.72) rgba(255, 255, 255, 0.06);
        }
        .replay-list::-webkit-scrollbar { width: 10px; }
        .replay-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
        }
        .replay-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(248, 113, 113, 0.95) 0%, rgba(220, 38, 38, 0.95) 100%);
            border-radius: 999px;
            border: 2px solid rgba(44, 46, 49, 0.95);
        }
        .replay-list::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(252, 165, 165, 0.98) 0%, rgba(239, 68, 68, 0.98) 100%);
        }

        .player-shell {
            background: radial-gradient(circle at top left, rgba(239, 68, 68, 0.2), transparent 32%),
                        radial-gradient(circle at top right, rgba(125, 58, 41, 0.24), transparent 26%),
                        linear-gradient(180deg, #1a1d20 0%, #101214 100%);
        }
        .player-stage {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        .yt-frame {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
        .player-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(20, 23, 26, 0.18) 0%, rgba(20, 23, 26, 0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px;
            height: 78px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(239, 68, 68, 0.92);
            color: #fff;
            font-size: 1.8rem;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
            transition: all 0.2s ease;
        }
        .overlay-play:hover {
            transform: scale(1.08);
            background: rgba(220, 38, 38, 0.98);
        }

        .replay-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, rgba(72, 76, 78, 0.3) 0%, rgba(44, 46, 49, 0.9) 100%);
            transition: all 0.2s ease;
        }
        .replay-card:hover, .replay-card.active {
            border-color: rgba(239, 68, 68, 0.7);
            transform: translateY(-2px);
            background: linear-gradient(180deg, rgba(127, 29, 29, 0.35) 0%, rgba(44, 46, 49, 0.95) 100%);
        }

        .page-guard {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 12, 14, 0.94);
            backdrop-filter: blur(10px);
            z-index: 99999;
        }
        .page-guard.hidden { display: none; }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="#" class="flex items-center">
                <img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9">
            </a>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 bg-[#14171a] rounded-lg px-3 py-1">
                    <img src="https://www.idn.app/_next/static/media/ic_gold.2cb768bf.svg" width="30" height="30">
                    <span class="font-semibold">48</span>
                    <a href="https://gemes.in" target="_blank" class="bg-red-600 hover:bg-red-700 text-xs font-bold px-4 py-1 rounded">Top Up</a>
                </div>
                <div class="w-10 h-10 rounded-full border-2 border-gray-600 overflow-hidden">
                    <img src="https://raw.githubusercontent.com/gemes-in/gemes-in.github.io/refs/heads/main/assets/images/gemesin_with_text.png" alt="Avatar">
                </div>
            </div>
        </div>
    </header>

    <main class="replay-layout flex-1 flex flex-col md:flex-row max-w-7xl mx-auto w-full gap-4 p-4">
        
        <!-- Player Section -->
        <section class="flex-1 flex flex-col">
            <div class="player-shell rounded-3xl overflow-hidden border border-gray-800 shadow-2xl">
                <div class="player-stage">
                    <div id="youtubeContainer" class="w-full h-full"></div>
                    
                    <div id="playerOverlay" class="player-overlay">
                        <button onclick="playVideo()" class="overlay-play">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stream Info -->
            <div class="mt-6 bg-[#2c2e31] rounded-3xl p-6 flex flex-col md:flex-row gap-6">
                <div class="flex items-center gap-5">
                    <div class="relative w-32 h-32 flex-shrink-0">
                        <img src="https://cdn.idn.media/idnaccount/avatar/500/82baca53b222467300863a9f63b08d1b.webp" 
                             class="w-24 h-24 rounded-full object-cover ring-4 ring-[#7d3a29]">
                        <img src="https://cdn.idn.media/content-images/benefit/image/avatar-frame-bos-besar.png" 
                             class="absolute inset-0 w-full h-full object-contain">
                    </div>
                    <div>
                        <span class="bg-[#7d3a29] text-white text-sm font-bold px-4 py-1 rounded-full inline-flex items-center gap-2">
                            <i class="fa-solid fa-crown"></i> Official
                        </span>
                        <h3 class="text-3xl font-bold mt-3">Official JKT48</h3>
                    </div>
                </div>
                <div class="flex-1 flex items-center justify-end gap-8">
                    <div class="flex gap-8">
                        <div>
                            <p class="text-gray-400 text-xs">Following</p>
                            <p class="text-3xl font-bold">7</p>
                        </div>
                        <div>
                            <p class="text-gray-400 text-xs">Followers</p>
                            <p class="text-3xl font-bold">484.8K</p>
                        </div>
                    </div>
                    <a href="https://gemes.in" target="_blank" 
                       class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-2xl font-bold transition">
                        Follow
                    </a>
                </div>
            </div>
        </section>

        <!-- Sidebar -->
        <aside class="replay-sidebar w-full md:w-96 bg-[#2c2e31] rounded-3xl flex flex-col overflow-hidden">
            <div class="border-b border-gray-700 p-4 text-center font-semibold text-lg">Daftar Replay</div>
            <div class="p-4 border-b border-gray-700">
                <input id="searchInput" type="text" placeholder="Cari judul replay..." 
                       class="w-full bg-[#1f2326] border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            <div id="replayList" class="replay-list flex-1 p-4 space-y-3 overflow-auto">
                <!-- Dummy -->
                <div class="replay-card rounded-2xl p-3 cursor-pointer" onclick="alert('Replay ini sedang diputar')">
                    <div class="flex gap-3">
                        <img src="https://i.ytimg.com/vi/1MC3i_68xqg/hqdefault.jpg" class="w-28 rounded-xl">
                        <div class="flex-1">
                            <p class="font-medium line-clamp-2">JKT48 - Special Stage Performance</p>
                            <p class="text-xs text-gray-400 mt-2">24 April 2026 • 1.2M views</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const videoId = "1MC3i_68xqg";   // ← Ganti ID ini untuk video lain

        function loadYouTube() {
            const container = document.getElementById('youtubeContainer');
            const iframe = document.createElement('iframe');
            iframe.className = "yt-frame";
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&modestbranding=1&rel=0&showinfo=0&fs=1`;
            iframe.allowFullscreen = true;
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            container.appendChild(iframe);
        }

        function playVideo() {
            const iframe = document.querySelector('#youtubeContainer iframe');
            if (iframe) {
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0`;
            }
            document.getElementById('playerOverlay').classList.add('hidden');
        }

        // Load player saat halaman dibuka
        document.addEventListener('DOMContentLoaded', () => {
            loadYouTube();
            
            // Search functionality (dummy)
            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                if (e.key === "Enter") console.log("Mencari:", e.target.value);
            });
        });
    </script>
</body>
</html>

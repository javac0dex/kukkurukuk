<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replay Theater - Private</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        
        body {
            font-family: "Atkinson Hyperlegible", sans-serif;
        }
        
        .player-stage {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        
        .yt-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .replay-card {
            transition: all 0.2s ease;
        }
        
        .replay-card:hover {
            transform: translateY(-2px);
            border-color: rgb(239 68 68);
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="#" class="flex items-center gap-2">
                <img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN" class="h-8">
            </a>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 bg-[#14171a] px-3 py-1 rounded-lg">
                    <img src="https://www.idn.app/_next/static/media/ic_gold.2cb768bf.svg" width="28" height="28">
                    <span class="font-bold">48</span>
                    <a href="https://gemes.in" target="_blank" class="bg-red-600 hover:bg-red-700 text-xs font-bold px-4 py-1 rounded">Top Up</a>
                </div>
                <div class="w-9 h-9 rounded-full overflow-hidden border-2 border-gray-600">
                    <img src="https://raw.githubusercontent.com/gemes-in/gemes-in.github.io/refs/heads/main/assets/images/gemesin_with_text.png" alt="Avatar" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row max-w-7xl mx-auto w-full gap-4 p-4">
        <!-- Player Section -->
        <section class="flex-1 flex flex-col">
            <div class="player-shell bg-[#1a1d20] rounded-3xl overflow-hidden border border-gray-800 shadow-2xl">
                <div class="player-stage">
                    <!-- YouTube iframe akan di-load via JS agar link tidak langsung kelihatan di source -->
                    <div id="youtubeContainer" class="w-full h-full"></div>
                    
                    <!-- Overlay play (opsional) -->
                    <div id="overlay" class="absolute inset-0 flex items-center justify-center bg-black/40 transition-opacity hidden">
                        <button onclick="playVideo()" class="w-20 h-20 rounded-full bg-red-600 flex items-center justify-center text-4xl shadow-xl hover:scale-110 transition">
                            <i class="fa-solid fa-play ml-1"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Custom Controls -->
                <div class="p-4 bg-[#14171a]">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-red-400 text-xs font-bold tracking-widest">REPLAY READY</p>
                            <h1 id="title" class="text-white text-2xl font-bold">JKT48 Official Replay</h1>
                            <p class="text-gray-400 text-sm">24 April 2026 • Private</p>
                        </div>
                        <div class="text-xs text-gray-500 hidden md:block">Private Mode</div>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <button onclick="togglePlay()" id="playBtn" class="w-12 h-12 bg-red-600 hover:bg-red-700 rounded-full flex items-center justify-center text-xl">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button onclick="toggleMute()" class="w-12 h-12 bg-gray-800 hover:bg-gray-700 rounded-full flex items-center justify-center text-xl">
                            <i id="muteIcon" class="fa-solid fa-volume-high"></i>
                        </button>
                        <button onclick="toggleFullscreen()" class="ml-auto w-12 h-12 bg-gray-800 hover:bg-gray-700 rounded-full flex items-center justify-center text-xl">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Streamer Info -->
            <div class="mt-6 bg-[#2c2e31] rounded-2xl p-6 flex flex-col md:flex-row gap-6">
                <div class="flex items-center gap-4">
                    <div class="relative w-28 h-28 flex-shrink-0">
                        <img src="https://cdn.idn.media/idnaccount/avatar/500/82baca53b222467300863a9f63b08d1b.webp" alt="JKT48" class="w-20 h-20 rounded-full object-cover ring-4 ring-[#7d3a29]">
                        <img src="https://cdn.idn.media/content-images/benefit/image/avatar-frame-bos-besar.png" class="absolute inset-0 w-full h-full">
                    </div>
                    <div>
                        <span class="inline-flex items-center gap-1 bg-[#7d3a29] text-white text-sm px-3 py-1 rounded-full">
                            <i class="fa-solid fa-crown"></i>
                            Official Streamer
                        </span>
                        <h3 class="text-2xl font-bold mt-2">Official JKT48</h3>
                    </div>
                </div>
                
                <div class="flex-1 flex flex-wrap gap-8 md:justify-end items-center">
                    <div class="flex gap-8">
                        <div>
                            <div class="text-gray-400 text-xs">Following</div>
                            <div class="text-3xl font-bold">7</div>
                        </div>
                        <div>
                            <div class="text-gray-400 text-xs">Followers</div>
                            <div class="text-3xl font-bold">484.8K</div>
                        </div>
                    </div>
                    <a href="https://gemes.in" target="_blank" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl font-bold">Follow</a>
                </div>
            </div>
        </section>

        <!-- Sidebar Replay List -->
        <aside class="md:w-96 bg-[#2c2e31] rounded-3xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-gray-700 text-center font-semibold text-lg">Daftar Replay</div>
            <div class="p-4">
                <input type="text" id="search" placeholder="Cari judul..." 
                       class="w-full bg-[#1f2326] border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            <div class="flex-1 overflow-auto p-4 space-y-3" id="replayList">
                <!-- Dummy replay cards -->
                <div class="replay-card bg-[#1f2326] border border-gray-700 rounded-2xl p-3 cursor-pointer" onclick="alert('Replay lain belum tersedia')">
                    <div class="flex gap-3">
                        <img src="https://i.ytimg.com/vi/1MC3i_68xqg/hqdefault.jpg" class="w-24 rounded-lg">
                        <div class="flex-1">
                            <p class="font-medium line-clamp-2">JKT48 - Special Performance</p>
                            <p class="text-xs text-gray-400 mt-1">23 April 2026 • 2.3M views</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <footer class="bg-[#2c2e31] py-8 text-center text-sm text-gray-400">
        <p>Replay Theater • Private View Only</p>
    </footer>

    <script>
        // === YT VIDEO ID (disembunyikan dari view source) ===
        const videoId = "1MC3i_68xqg";   // Ganti kalau mau video lain
        
        // Load YouTube iframe secara dinamis
        function loadYouTube() {
            const container = document.getElementById('youtubeContainer');
            const iframe = document.createElement('iframe');
            iframe.className = "yt-frame";
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&modestbranding=1&rel=0&showinfo=0`;
            iframe.allowFullscreen = true;
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            container.appendChild(iframe);
        }

        function playVideo() {
            const iframe = document.querySelector('#youtubeContainer iframe');
            if (iframe) {
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0`;
            }
            document.getElementById('overlay').classList.add('hidden');
        }

        function togglePlay() {
            alert("Gunakan kontrol YouTube di dalam player (klik video untuk play/pause)");
        }

        function toggleMute() {
            alert("Gunakan tombol mute di player YouTube");
        }

        function toggleFullscreen() {
            const container = document.querySelector('.player-stage');
            if (container.requestFullscreen) container.requestFullscreen();
        }

        // Tailwind script
        document.addEventListener('DOMContentLoaded', () => {
            loadYouTube();
            
            // Search dummy
            document.getElementById('search').addEventListener('input', (e) => {
                console.log('Cari:', e.target.value);
            });
        });
    </script>
</body>
</html>

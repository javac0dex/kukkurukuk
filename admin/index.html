<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Replay Theater by Gemes.in</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/video.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        .replay-layout { min-height: 0; }
        .replay-sidebar { min-height: 0; max-height: min(70vh, 760px); overflow: hidden; }
        .replay-list {
            min-height: 0; overscroll-behavior: contain; scrollbar-gutter: stable;
            scrollbar-width: thin; scrollbar-color: rgba(239, 68, 68, 0.72) rgba(255, 255, 255, 0.06);
        }
        .replay-list::-webkit-scrollbar { width: 10px; }
        .replay-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 999px; }
        .replay-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(248,113,113,0.95) 0%, rgba(220,38,38,0.95) 100%);
            border-radius: 999px; border: 2px solid rgba(44,46,49,0.95);
        }
        .player-shell {
            background: radial-gradient(circle at top left, rgba(239,68,68,0.2), transparent 32%),
                        radial-gradient(circle at top right, rgba(125,58,41,0.24), transparent 26%),
                        linear-gradient(180deg, #1a1d20 0%, #101214 100%);
        }
        .player-stage { 
            position: relative; 
            background: #000; 
            aspect-ratio: 16 / 9; 
        }
        .player-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }
        .replay-card {
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(72,76,78,0.3) 0%, rgba(44,46,49,0.9) 100%);
            transition: all 0.2s ease;
        }
        .replay-card:hover, .replay-card.active {
            border-color: rgba(239,68,68,0.7); transform: translateY(-2px);
            background: linear-gradient(180deg, rgba(127,29,29,0.35) 0%, rgba(44,46,49,0.95) 100%);
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen font-sans">
    <!-- HEADER -->
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3 sm:px-6 md:px-8">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 bg-[#14171a] rounded-lg px-3 py-1">
                    <img src="https://www.idn.app/_next/static/media/ic_gold.2cb768bf.svg" width="30" height="30">
                    <span class="font-semibold">48</span>
                    <a href="https://gemes.in" target="_blank" class="bg-red-600 hover:bg-red-700 text-xs font-bold px-4 py-1 rounded">Top Up</a>
                </div>
                <div class="w-10 h-10 rounded-full border-2 border-gray-600 overflow-hidden">
                    <img src="https://raw.githubusercontent.com/gemes-in/gemes-in.github.io/refs/heads/main/assets/images/gemesin_with_text.png" alt="Avatar">
                </div>
            </div>
        </div>
    </header>

    <main class="replay-layout flex flex-col md:flex-row flex-grow max-w-7xl mx-auto w-full gap-4 p-4">
        <section class="flex flex-col flex-1">
            <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
                <div class="player-stage" id="playerStage">
                    <media-player id="replayPlayer" class="replay-media-player" 
                                  view-type="video" 
                                  stream-type="on-demand" 
                                  playsinline 
                                  crossorigin>
                        <media-provider></media-provider>
                        <media-video-layout small-layout-when="never"></media-video-layout>
                    </media-player>
                    <div id="playerOverlay" class="player-overlay">
                        <button id="overlayPlayButton" class="overlay-play">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="mt-5 px-1">
                <p id="playerStatus" class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">Replay Ready</p>
                <h1 id="replayTitle" class="text-white text-2xl font-bold">Pilih replay</h1>
                <p id="replayDate" class="text-gray-400 text-sm">Belum ada replay dipilih</p>
            </div>
        </section>

        <!-- SIDEBAR -->
        <aside class="replay-sidebar w-full md:w-96 bg-[#2c2e31] rounded-3xl flex flex-col overflow-hidden">
            <div class="flex border-b border-gray-700">
                <button class="flex-1 py-4 text-center border-b-2 border-red-600 font-semibold">Daftar Replay</button>
            </div>
            <div id="searchBarWrap" class="p-4 border-b border-gray-700">
                <input id="searchInput" type="text" placeholder="Cari judul replay..."
                       class="w-full bg-[#1f2326] border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            <div id="replayList" class="replay-list flex-1 p-4 space-y-3 overflow-auto"></div>
        </aside>
    </main>

    <script type="module" src="https://cdn.vidstack.io/player"></script>
    <script>
        const state = { allReplays: [], filteredReplays: [], currentReplay: null };

        const elements = {
            replayPlayer: document.getElementById("replayPlayer"),
            replayList: document.getElementById("replayList"),
            searchInput: document.getElementById("searchInput"),
            replayTitle: document.getElementById("replayTitle"),
            replayDate: document.getElementById("replayDate"),
            playerStatus: document.getElementById("playerStatus"),
            overlayPlayButton: document.getElementById("overlayPlayButton"),
            playerOverlay: document.getElementById("playerOverlay"),
            playerStage: document.getElementById("playerStage")
        };

        let isFullscreen = false;

        function getYouTubeSrc(videoId) {
            return videoId ? `youtube/${videoId.trim()}` : "";
        }

        function formatDate(dateString) {
            if (!dateString) return "—";
            try {
                return new Intl.DateTimeFormat("id-ID", { day: "2-digit", month: "long", year: "numeric" })
                    .format(new Date(dateString));
            } catch { return dateString; }
        }

        function toggleOverlay(show) {
            if (show) elements.playerOverlay.classList.remove("hidden");
            else elements.playerOverlay.classList.add("hidden");
        }

        function renderList() {
            if (!state.filteredReplays.length) {
                elements.replayList.innerHTML = `<div class="rounded-2xl p-8 text-center text-gray-400">Tidak ada replay</div>`;
                return;
            }
            elements.replayList.innerHTML = state.filteredReplays.map((replay, i) => `
                <div class="replay-card rounded-2xl p-4 cursor-pointer ${state.currentReplay?.id === replay.id ? 'active' : ''}" data-index="${i}">
                    <div class="flex justify-between text-xs mb-2">
                        <span class="text-red-400 font-bold">ARCHIVE</span>
                        <span class="text-gray-500">${formatDate(replay.tanggal)}</span>
                    </div>
                    <h3 class="font-bold leading-tight">${replay.judul || "Tanpa Judul"}</h3>
                </div>
            `).join("");

            elements.replayList.querySelectorAll(".replay-card").forEach(card => {
                card.addEventListener("click", () => {
                    const replay = state.filteredReplays[card.dataset.index];
                    if (replay) loadReplayIntoPlayer(replay);
                });
            });
        }

        function applySearch() {
            const keyword = elements.searchInput.value.toLowerCase().trim();
            state.filteredReplays = keyword ? 
                state.allReplays.filter(r => (r.judul || "").toLowerCase().includes(keyword) || 
                                             (r.tanggal || "").toLowerCase().includes(keyword)) 
                : [...state.allReplays];
            renderList();
        }

        function loadReplayIntoPlayer(replay) {
            state.currentReplay = replay;
            elements.replayTitle.textContent = replay.judul || "Tanpa Judul";
            elements.replayDate.textContent = formatDate(replay.tanggal);
            elements.playerStatus.textContent = "Memuat replay...";

            elements.replayPlayer.src = getYouTubeSrc(replay.videoId);
            toggleOverlay(true);
            renderList();
        }

        function init() {
            state.allReplays = [
                { id: "1", judul: "JKT48 Special Performance", tanggal: "2026-04-24", videoId: "1MC3i_68xqg" }
            ];
            state.filteredReplays = [...state.allReplays];
            renderList();
            if (state.allReplays.length > 0) loadReplayIntoPlayer(state.allReplays[0]);

            elements.searchInput.addEventListener("input", applySearch);
            elements.overlayPlayButton.addEventListener("click", () => {
                elements.replayPlayer.play().catch(() => {});
            });

            const player = elements.replayPlayer;

            // Vidstack Events
            player.addEventListener("play", () => toggleOverlay(false));
            player.addEventListener("pause", () => toggleOverlay(true));
            player.addEventListener("ended", () => toggleOverlay(true));

            // Fullscreen detection
            player.addEventListener("fullscreen-change", (e) => {
                isFullscreen = e.detail.active || false;
            });

            // ================== CLICK HANDLER YANG SUDAH DIBERSIHKAN ==================
            elements.playerStage.addEventListener("click", (e) => {
                // Jangan lakukan apa-apa jika klik tombol overlay
                if (e.target.closest("#overlayPlayButton")) return;

                // **PENTING**: Skip semua custom toggle saat fullscreen
                if (isFullscreen) return;

                // Toggle play/pause hanya di mode normal
                if (player.paused) {
                    player.play();
                } else {
                    player.pause();
                }
            });

            // Mouse leave hanya di mode normal
            elements.playerStage.addEventListener("mouseleave", () => {
                if (!player.paused && !isFullscreen) {
                    toggleOverlay(false);
                }
            });
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>

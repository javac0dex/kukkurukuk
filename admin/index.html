<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Replay Theater • JKT48</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');

        body {
            font-family: "Atkinson Hyperlegible", sans-serif;
        }

        .player-stage {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        }

        .player-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.75) 100%);
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .player-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .overlay-play {
            width: 90px;
            height: 90px;
            background: #ef4444;
            color: white;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.3),
                        0 25px 50px -12px rgb(0 0 0 / 0.5);
            transition: all 0.2s ease;
        }

        .overlay-play:hover {
            transform: scale(1.1);
            box-shadow: 0 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .replay-card {
            transition: all 0.2s ease;
        }
        .replay-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
    </style>
</head>
<body class="bg-[#0f1217] text-gray-200 min-h-screen">

    <!-- Header -->
    <header class="bg-[#1a1d24] border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN" class="h-9">
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-3 bg-[#14171a] px-4 py-2 rounded-2xl">
                    <img src="https://www.idn.app/_next/static/media/ic_gold.2cb768bf.svg" width="28" height="28">
                    <span class="font-bold text-lg">48</span>
                </div>
                <div class="w-9 h-9 rounded-2xl overflow-hidden border border-gray-600">
                    <img src="https://raw.githubusercontent.com/gemes-in/gemes-in.github.io/refs/heads/main/assets/images/gemesin_with_text.png" alt="User">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- PLAYER -->
        <div class="flex-1">
            <div id="playerContainer" class="player-stage">
                <media-player id="replayPlayer" class="w-full h-full" view-type="video" stream-type="on-demand" playsinline>
                    <media-provider></media-provider>
                </media-player>
                
                <!-- Overlay Play Button -->
                <div id="playerOverlay" class="player-overlay">
                    <button id="overlayPlayButton" class="overlay-play">
                        <i class="fa-solid fa-play ml-1"></i>
                    </button>
                </div>
            </div>

            <!-- Info -->
            <div class="mt-6">
                <p id="playerStatus" class="text-red-500 text-sm font-bold tracking-widest">● REPLAY</p>
                <h1 id="replayTitle" class="text-3xl font-bold mt-2">JKT48 - Special Performance</h1>
                <p id="replayDate" class="text-gray-400 mt-1">24 April 2026 • Official JKT48</p>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="w-full lg:w-96 bg-[#1a1d24] rounded-3xl overflow-hidden">
            <div class="p-5 border-b border-gray-800 font-semibold text-lg">Daftar Replay</div>
            <div class="p-4">
                <input id="searchInput" type="text" 
                       class="w-full bg-[#24272e] border border-gray-700 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:border-red-500"
                       placeholder="Cari judul replay...">
            </div>
            <div id="replayList" class="p-4 space-y-3 max-h-[calc(100vh-280px)] overflow-auto"></div>
        </div>
    </main>

    <script type="module" src="https://cdn.vidstack.io/player"></script>
    <script>
        const state = {
            allReplays: [],
            filteredReplays: [],
            currentReplay: null,
            isPlaying: false,
        };

        const elements = {
            playerContainer: document.getElementById("playerContainer"),
            replayPlayer: document.getElementById("replayPlayer"),
            replayList: document.getElementById("replayList"),
            searchInput: document.getElementById("searchInput"),
            replayTitle: document.getElementById("replayTitle"),
            replayDate: document.getElementById("replayDate"),
            playerOverlay: document.getElementById("playerOverlay"),
            overlayPlayButton: document.getElementById("overlayPlayButton"),
        };

        function formatDate(dateString) {
            try {
                return new Intl.DateTimeFormat("id-ID", {day:"2-digit", month:"long", year:"numeric"}).format(new Date(dateString));
            } catch { return dateString || "—"; }
        }

        function toggleOverlay(show) {
            if (show) {
                elements.playerOverlay.classList.add("show");
            } else {
                elements.playerOverlay.classList.remove("show");
            }
        }

        function updateOverlay() {
            const shouldShow = !state.isPlaying;
            toggleOverlay(shouldShow);
        }

        function loadReplay(replay) {
            state.currentReplay = replay;
            elements.replayTitle.textContent = replay.judul;
            elements.replayDate.textContent = `${formatDate(replay.tanggal)} • Official JKT48`;
            
            elements.replayPlayer.src = `https://www.youtube.com/embed/${replay.videoId}?autoplay=0&modestbranding=1`;
            state.isPlaying = false;
            updateOverlay();
        }

        function renderList() {
            elements.replayList.innerHTML = state.filteredReplays.map((replay, i) => `
                <div class="replay-card bg-[#24272e] hover:bg-[#2a2f38] rounded-2xl p-4 cursor-pointer flex gap-4" data-index="${i}">
                    <img src="https://i.ytimg.com/vi/1MC3i_68xqg/hqdefault.jpg" class="w-24 rounded-xl object-cover">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-semibold leading-tight line-clamp-2">${replay.judul}</h4>
                        <p class="text-xs text-gray-400 mt-2">${formatDate(replay.tanggal)}</p>
                    </div>
                </div>
            `).join("");

            elements.replayList.querySelectorAll("[data-index]").forEach(el => {
                el.addEventListener("click", () => {
                    const replay = state.filteredReplays[el.dataset.index];
                    loadReplay(replay);
                });
            });
        }

        function init() {
            state.allReplays = [
                {
                    judul: "JKT48 - Special Performance",
                    tanggal: "2026-04-24",
                    videoId: "1MC3i_68xqg"
                }
            ];
            state.filteredReplays = [...state.allReplays];

            renderList();
            loadReplay(state.allReplays[0]);

            // Search
            elements.searchInput.addEventListener("input", () => {
                const q = elements.searchInput.value.toLowerCase();
                state.filteredReplays = state.allReplays.filter(r => 
                    r.judul.toLowerCase().includes(q)
                );
                renderList();
            });

            // Play Button Click
            elements.overlayPlayButton.addEventListener("click", () => {
                elements.replayPlayer.play();
            });

            // Hover Logic
            const container = elements.playerContainer;
            
            container.addEventListener("mouseenter", () => {
                if (!state.isPlaying) toggleOverlay(true);
            });

            container.addEventListener("mouseleave", () => {
                if (!state.isPlaying) toggleOverlay(false);
            });

            // Vidstack / Media Player Events
            elements.replayPlayer.addEventListener("play", () => {
                state.isPlaying = true;
                updateOverlay();
            });

            elements.replayPlayer.addEventListener("pause", () => {
                state.isPlaying = false;
                updateOverlay();
            });

            elements.replayPlayer.addEventListener("ended", () => {
                state.isPlaying = false;
                updateOverlay();
            });
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>

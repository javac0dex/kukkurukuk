<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/video.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        .replay-layout { min-height: 0; }
        .replay-sidebar { min-height: 0; max-height: min(70vh, 760px); overflow: hidden; }
        .replay-list {
            min-height: 0; overscroll-behavior: contain; scrollbar-gutter: stable;
            scrollbar-width: thin; scrollbar-color: rgba(239, 68, 68, 0.72) rgba(255, 255, 255, 0.06);
        }
        .player-stage { position: relative; background: #000; aspect-ratio: 16 / 9; }
        .player-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen font-sans">
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
        </div>
    </header>
    <main class="replay-layout flex flex-col md:flex-row flex-grow max-w-7xl mx-auto w-full gap-4 p-4">
        <section class="flex flex-col flex-1">
            <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
                <div class="player-stage" id="playerStage">
                    <media-player id="replayPlayer" class="replay-media-player"
                                  view-type="video"
                                  stream-type="on-demand"
                                  playsinline
                                  crossorigin>
                        <media-provider></media-provider>
                        <media-video-layout small-layout-when="never"></media-video-layout>
                    </media-player>
                    <div id="playerOverlay" class="player-overlay">
                        <button id="overlayPlayButton" class="overlay-play">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="mt-5 px-1">
                <p id="playerStatus" class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">Replay Ready</p>
                <h1 id="replayTitle" class="text-white text-2xl font-bold">Pilih replay</h1>
                <p id="replayDate" class="text-gray-400 text-sm">Belum ada replay dipilih</p>
            </div>
        </section>
        <aside class="replay-sidebar w-full md:w-96 bg-[#2c2e31] rounded-3xl flex flex-col overflow-hidden">
            <div class="flex border-b border-gray-700">
                <button class="flex-1 py-4 text-center border-b-2 border-red-600 font-semibold">Daftar Replay</button>
            </div>
            <div id="searchBarWrap" class="p-4 border-b border-gray-700">
                <input id="searchInput" type="text" placeholder="Cari judul replay..."
                       class="w-full bg-[#1f2326] border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            <div id="replayList" class="replay-list flex-1 p-4 space-y-3 overflow-auto"></div>
        </aside>
    </main>

    <script type="module" src="https://cdn.vidstack.io/player"></script>

    <!-- Script Iklan -->
    <script>
        var links = [
            "https://s.shopee.co.id/20rVZGM43C",
            "https://s.shopee.co.id/4Aw7rZTpvo",
            "https://s.shopee.co.id/3qJ9jIFPPf",
            "https://s.shopee.co.id/4fsGj5Ymeb",
            "https://s.shopee.co.id/9fH1WaO9Kq"
        ];
        var delay = 60000;
        document.addEventListener("click", function() {
            var lastOpen = localStorage.getItem("lastAdOpen");
            var now = Date.now();
            if (!lastOpen || now - lastOpen > delay) {
                var randomLink = links[Math.floor(Math.random() * links.length)];
                window.open(randomLink, "_blank");
                localStorage.setItem("lastAdOpen", now);
            }
        });
    </script>

    <!-- Anti DevTools (Khusus Desktop Saja) -->
    <script>
        function isMobile() {
            return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   window.innerWidth <= 768;
        }

        // HANYA JALANKAN ANTI DEVTOOLS DI DESKTOP
        if (!isMobile()) {
            let devToolsOpen = false;

            // Deteksi ukuran window
            function detectDevTools() {
                const widthDiff = window.outerWidth - window.innerWidth;
                const heightDiff = window.outerHeight - window.innerHeight;

                if ((widthDiff > 160 || heightDiff > 160) && !devToolsOpen) {
                    devToolsOpen = true;
                    document.body.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;">
                            <div>
                                <h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Access Denied</h1>
                                <p>Developer tools terdeteksi.</p>
                            </div>
                        </div>`;
                    setTimeout(() => window.location.href = 'about:blank', 800);
                }
            }

            // Block shortcut keys (F12, Ctrl+Shift+I, dll)
            function blockDevToolsKeys(e) {
                const blocked = [
                    e.key === 'F12' || e.keyCode === 123,
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                    (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                    (e.ctrlKey && e.key === 'U') || (e.metaKey && e.key === 'U')
                ];

                if (blocked.some(Boolean)) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return false;
                }
            }

            // Event listeners - HANYA DI DESKTOP
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', blockDevToolsKeys, true);
            window.addEventListener('keydown', blockDevToolsKeys, true);

            // Jalankan deteksi setiap 500ms
            setInterval(detectDevTools, 500);
        }
    </script>

    <!-- Script Replay -->
    <script>
        const state = { allReplays: [], filteredReplays: [], currentReplay: null };
        let shouldAutoPlay = true;
        let isUserPaused = false;

        const elements = {
            replayPlayer: document.getElementById("replayPlayer"),
            replayList: document.getElementById("replayList"),
            searchInput: document.getElementById("searchInput"),
            replayTitle: document.getElementById("replayTitle"),
            replayDate: document.getElementById("replayDate"),
            playerStatus: document.getElementById("playerStatus"),
            overlayPlayButton: document.getElementById("overlayPlayButton"),
            playerOverlay: document.getElementById("playerOverlay"),
            playerStage: document.getElementById("playerStage")
        };

        function getYouTubeSrc(videoId) {
            return videoId ? `youtube/${videoId.trim()}` : "";
        }

        function formatDate(dateString) {
            if (!dateString) return "—";
            try {
                return new Intl.DateTimeFormat("id-ID", { day: "2-digit", month: "long", year: "numeric" }).format(new Date(dateString));
            } catch { return dateString; }
        }

        function toggleOverlay(show) {
            show ? elements.playerOverlay.classList.remove("hidden") : elements.playerOverlay.classList.add("hidden");
        }

        function forcePlay(player) {
            if (shouldAutoPlay && !isUserPaused) {
                setTimeout(() => player.play().catch(() => {}), 100);
            }
        }

        function loadReplayIntoPlayer(replay) {
            state.currentReplay = replay;
            elements.replayTitle.textContent = replay.judul || "Tanpa Judul";
            elements.replayDate.textContent = formatDate(replay.tanggal);
            elements.replayPlayer.src = getYouTubeSrc(replay.videoId);
            isUserPaused = false;
            shouldAutoPlay = true;
            toggleOverlay(true);
            renderReplayList(state.filteredReplays);
        }

        function renderReplayList(replays) {
            elements.replayList.innerHTML = "";
            replays.forEach(replay => {
                const item = document.createElement("div");
                item.className = `bg-[#1f2326] border border-gray-700 rounded-xl p-3 cursor-pointer transition-all hover:border-red-500 hover:shadow-lg ${
                    state.currentReplay?.id === replay.id ? "border-red-500 bg-[#2a2d31]" : ""
                }`;
                item.innerHTML = `
                    <p class="text-white font-semibold text-sm">${replay.judul || "Tanpa Judul"}</p>
                    <p class="text-gray-400 text-xs mt-1">${formatDate(replay.tanggal)}</p>
                `;
                item.addEventListener("click", () => loadReplayIntoPlayer(replay));
                elements.replayList.appendChild(item);
            });
        }

        function init() {
            state.allReplays = [
                { id: "1", judul: "Arena Replay", tanggal: "2026-03-29", videoId: "4ZcC3Isf06w" },
                { id: "2", judul: "Arena Replay 2", tanggal: "2026-03-30", videoId: "RQi4VWakVQA" },
                { id: "3", judul: "Arena Replay 3", tanggal: "2026-03-31", videoId: "njSI04qHZ70" }
            ];
            state.filteredReplays = [...state.allReplays];
            renderReplayList(state.filteredReplays);
            if (state.allReplays.length > 0) loadReplayIntoPlayer(state.allReplays[0]);

            const player = elements.replayPlayer;

            player.addEventListener("play", () => { toggleOverlay(false); isUserPaused = false; });
            player.addEventListener("pause", () => { toggleOverlay(true); if (!isUserPaused) forcePlay(player); });
            player.addEventListener("ended", () => { toggleOverlay(true); shouldAutoPlay = false; });
            player.addEventListener("waiting", () => forcePlay(player));
            player.addEventListener("canplay", () => forcePlay(player));
            player.addEventListener("seeked", () => forcePlay(player));

            elements.playerStage.addEventListener("click", (e) => {
                if (e.target.closest("#overlayPlayButton")) return;
                if (player.paused) {
                    isUserPaused = false; shouldAutoPlay = true; player.play().catch(() => {});
                } else {
                    isUserPaused = true; shouldAutoPlay = false; player.pause();
                }
            });

            elements.overlayPlayButton.addEventListener("click", () => {
                isUserPaused = false; shouldAutoPlay = true; player.play().catch(() => {});
            });

            elements.searchInput.addEventListener("input", (e) => {
                const query = e.target.value.toLowerCase();
                state.filteredReplays = state.allReplays.filter(replay => 
                    replay.judul.toLowerCase().includes(query) || 
                    replay.tanggal.includes(query)
                );
                renderReplayList(state.filteredReplays);
            });
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>

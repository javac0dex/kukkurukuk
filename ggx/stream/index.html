<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLS Live Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --border: #1c2438;
      --accent: #00e5ff;
      --accent2: #ff3d71;
      --text: #e2e8f0;
      --muted: #64748b;
      --active: #00e5ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% 90%, rgba(255,61,113,0.05) 0%, transparent 60%);
    }

    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .live-dot {
      width: 10px; height: 10px;
      background: var(--accent2);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }

    .badge {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .player-wrap {
      width: 100%;
      max-width: 860px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(0,229,255,0.05), 0 24px 60px rgba(0,0,0,0.6);
      background: #000;
      position: relative;
    }

    video {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      background: #000;
    }

    .server-bar {
      width: 100%;
      max-width: 860px;
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .server-btn {
      flex: 1;
      min-width: 120px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .server-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,0.07), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .server-btn:hover::before { opacity: 1; }
    .server-btn:hover {
      border-color: rgba(0,229,255,0.3);
      color: var(--text);
    }
    .server-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(0,229,255,0.15);
    }
    .server-btn.active::before { opacity: 1; }

    .server-btn .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .server-btn.active .dot {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .status-bar {
      width: 100%;
      max-width: 860px;
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    #status-text {
      color: var(--accent);
      transition: color 0.3s;
    }
    #status-text.error { color: var(--accent2); }

    .sep { opacity: 0.3; }

    #quality-label {
      margin-left: auto;
      color: var(--muted);
    }

    /* loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8,12,20,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay p {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>

<header>
  <div class="live-dot"></div>
  <h1>HLS <span>Live</span> Player</h1>
  <div class="badge">● LIVE</div>
</header>

<div class="player-wrap">
  <video id="video" controls autoplay playsinline muted></video>
  <div class="loading-overlay" id="overlay">
    <div class="spinner"></div>
    <p>Menghubungkan ke server...</p>
  </div>
</div>

<div class="server-bar">
  <button class="server-btn active" onclick="switchServer(0)">
    <div class="dot"></div> Server 1
  </button>
  <button class="server-btn" onclick="switchServer(1)">
    <div class="dot"></div> Server 2
  </button>
  <button class="server-btn" onclick="switchServer(2)">
    <div class="dot"></div> Server 3
  </button>
</div>

<div class="status-bar">
  <span id="status-text">Memuat...</span>
  <span class="sep">|</span>
  <span id="server-label">Server 1</span>
  <span id="quality-label">—</span>
</div>

<script>
  const sources = [
    "https://live1.pro2cdnlive.com/live/channel1.m3u8?wsSecret=7a4e1729b80347ccab5529bf9aae0d9c&wsABSTime=1778642268",
    "https://fo-hlc.tv360.vn/bpk-tv/379/output/index.m3u8?auth=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJtZXRob2QiOiJHRVQiLCJleHAiOjE3Nzg2MjEzODgsInVyaSI6Ii9icGstdHYvMzc5L291dHB1dC9pbmRleC5tM3U4In0.ckiScI6w-cdaWZQp0Tb5qRc20zyu7_ckIdbmIxmcnPk&minrate=0&maxrate=10000000&uid=245524969",
    "https://pop12-ec1-ateme.tv360.vn/tok_eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJleHAiOiIxNzc4MzcxNjQ1Iiwic2lwIjoiIiwicGF0aCI6Ii9saXZlL2Vkcy80NTAvSExTX0NsZWFuX01ITF8ycy8iLCJzZXNzaW9uX2Nkbl9pZCI6ImFjZTgzNmRlMDkxZGZhMzUiLCJzZXNzaW9uX2lkIjoiIiwiY2xpZW50X2lkIjoiIiwiZGV2aWNlX2lkIjoiIiwibWF4X3Nlc3Npb25zIjowLCJzZXNzaW9uX2R1cmF0aW9uIjowLCJ1cmwiOiJodHRwczovLzE3Mi4yNC4xNzMuMTk2Iiwic2Vzc2lvbl90aW1lb3V0IjowLCJhdWQiOiIzNCIsInNvdXJjZXMiOls0OTVdfQ==.Ky69EzsNvgv9xuN9tR8AQvYcglEOqOKvE07DlAh8I0yZHJ6qvtTuV-UYlf819bl1H-Qw9K4QTGzvwS-vyDKu4A==/live/eds/450/HLS_Clean_MHL_2s/index.m3u8?screen=MHL&uid=245524969"
  ];

  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const statusText = document.getElementById('status-text');
  const serverLabel = document.getElementById('server-label');
  const qualityLabel = document.getElementById('quality-label');
  const buttons = document.querySelectorAll('.server-btn');

  let hls = null;
  let currentIndex = 0;

  function setStatus(msg, isError = false) {
    statusText.textContent = msg;
    statusText.className = isError ? 'error' : '';
  }

  function showLoading(show) {
    overlay.className = 'loading-overlay' + (show ? ' show' : '');
  }

  function switchServer(index) {
    if (index === currentIndex && hls) return;
    currentIndex = index;

    buttons.forEach((b, i) => b.classList.toggle('active', i === index));
    serverLabel.textContent = `Server ${index + 1}`;
    qualityLabel.textContent = '—';

    loadSource(sources[index]);
  }

  function loadSource(url) {
    showLoading(true);
    setStatus('Menghubungkan...');

    if (hls) { hls.destroy(); hls = null; }

    if (Hls.isSupported()) {
      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 90,
      });

      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        showLoading(false);
        setStatus('Terhubung');
        video.play().catch(() => {});
      });

      hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
        const level = hls.levels[data.level];
        if (level) {
          const res = level.height ? `${level.height}p` : '—';
          const bw = level.bitrate ? ` · ${Math.round(level.bitrate/1000)}kbps` : '';
          qualityLabel.textContent = res + bw;
        }
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          showLoading(true);
          setStatus('Gagal memuat stream — coba server lain', true);
          hls.destroy(); hls = null;
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = url;
      video.addEventListener('loadedmetadata', () => {
        showLoading(false);
        setStatus('Terhubung (native HLS)');
        video.play().catch(() => {});
      }, { once: true });
      video.addEventListener('error', () => {
        setStatus('Error: stream tidak dapat dimuat', true);
        showLoading(false);
      }, { once: true });
    } else {
      setStatus('Browser tidak mendukung HLS', true);
      showLoading(false);
    }
  }

  // Autoplay server 1 on load
  switchServer(0);
</script>

</body>
</html>

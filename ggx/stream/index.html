<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGX777 - Streaming Bola Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @keyframes float-ball {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(80px) translateY(-60px); }
            50% { transform: translateX(150px) translateY(0); }
            75% { transform: translateX(80px) translateY(60px); }
        }

        @keyframes rotate-ball {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent);
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            top: 10%;
            left: 5%;
            animation: float-ball 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            bottom: 15%;
            right: 8%;
            animation: float-ball 18s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .player-wrapper {
            background: #000;
            position: relative;
            padding-top: 56.25%;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-play {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
        }

        .btn-pause {
            background: #6c757d;
            color: white;
        }

        .btn-pause:hover {
            background: #5a6268;
        }

        .btn-fullscreen {
            background: #28a745;
            color: white;
        }

        .btn-fullscreen:hover {
            background: #218838;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            color: #666;
            font-size: 0.95em;
        }

        .status.loading {
            color: #ff9800;
        }

        .status.error {
            color: #f44336;
        }

        .status.playing {
            color: #4caf50;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 0.9em;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .controls {
                padding: 20px;
            }

            button {
                min-width: 100px;
                padding: 10px 15px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ GGX777</h1>
            <p>GGX777 bukan situs judol</p>
        </header>

        <div class="player-wrapper">
            <video id="videoPlayer" controls></video>
        </div>

        <div class="controls">
            <div class="button-group">
                <button class="btn-play" onclick="playStream()">▶ Putar Stream</button>
                <button class="btn-pause" onclick="pauseStream()">⏸ Hentikan</button>
                <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶ Fullscreen</button>
            </div>

            <div class="status" id="status">
                Status: Siap untuk diputar
            </div>
        </div>

        <footer>
            <p>GGX777 © 1990</p>
        </footer>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const statusDiv = document.getElementById('status');
        const streamUrl = 'https://d2w9q46ikgrcwx.cloudfront.net/v1/master/3722c60a815c199d9c0ef36c5b73da68a62b09d1/cc-of5cbk3sav3w5/v1/sysdata_s_p_a_fifa_7/samsungheadend_us/latest/main/hls/playlist.m3u8';

        function updateStatus(message, type = '') {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }

        function playStream() {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    updateStatus('Status: Stream sedang diputar ✓', 'playing');
                    video.play();
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        updateStatus('⚠ Error: Stream tidak dapat diakses. Periksa koneksi Anda.', 'error');
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari
                video.src = streamUrl;
                updateStatus('Status: Stream sedang diputar ✓', 'playing');
                video.play();
            } else {
                updateStatus('⚠ Error: Browser Anda tidak mendukung streaming HLS', 'error');
            }
        }

        function pauseStream() {
            video.pause();
            updateStatus('Status: Stream dijeda', '');
        }

        function toggleFullscreen() {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) {
                video.msRequestFullscreen();
            }
        }

        // Auto-load stream on page load
        window.addEventListener('load', function() {
            updateStatus('Status: Memuat stream...', 'loading');
        });
    </script>
</body>
</html>

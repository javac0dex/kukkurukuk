<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JKT48 Replay Theater</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/video.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Atkinson Hyperlegible", sans-serif;
            background: #14171a;
            color: #d1d5db;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-user-select: none;
            user-select: none;
        }

        input { -webkit-user-select: text; user-select: text; }

        /* HEADER */
        header {
            background: #2c2e31;
            border-bottom: 1px solid #374151;
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
        }
        header h1 { color: #fff; font-size: 1.1rem; font-weight: 700; }
        header span { color: #ef4444; }

        /* MAIN LAYOUT */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px 16px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }
        @media (min-width: 768px) {
            main { flex-direction: row; align-items: flex-start; padding: 24px; }
        }

        /* PLAYER SECTION */
        .player-section { flex: 1; display: flex; flex-direction: column; }

        .player-shell {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #374151;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background:
                radial-gradient(circle at top left, rgba(239,68,68,0.2), transparent 32%),
                radial-gradient(circle at top right, rgba(125,58,41,0.24), transparent 26%),
                linear-gradient(180deg, #1a1d20 0%, #101214 100%);
        }

        .player-stage {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        /* Vidstack */
        .replay-media-player,
        .replay-media-player video,
        .replay-media-player iframe {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
        .vds-video-layout { --video-brand: hsl(0, 72%, 51%); }

        /* OVERLAY */
        .player-overlay {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center; flex-direction: column; gap: 16px;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.82) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease;
            z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .overlay-title {
            color: #fff; font-size: 1rem; font-weight: 600;
            text-align: center; padding: 0 24px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem;
            box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }

        /* MOBILE TAP TARGET */
        #mobileTapTarget {
            display: none;
            position: absolute;
            left: 20%; top: 25%;
            width: 60%; height: 50%;
            z-index: 2147483646;
        }

        /* WATERMARK */
        #watermark {
            position: absolute;
            font-weight: bold;
            color: rgba(255,255,255,0.6);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 2147483647;
            user-select: none;
            white-space: nowrap;
            display: none;
        }

        /* NOW PLAYING BAR */
        .now-playing {
            background: #1e2124;
            border: 1px solid #374151; border-top: none;
            border-radius: 0 0 20px 20px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 12px;
            min-height: 58px;
        }
        .now-playing-dot {
            width: 8px; height: 8px; border-radius: 999px;
            background: #ef4444; flex-shrink: 0;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .now-playing-dot.idle { background: #4b5563; animation: none; }
        .now-playing-text { flex: 1; min-width: 0; }
        .now-playing-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 0.25em; color: #ef4444; font-weight: 700;
        }
        .now-playing-label.idle { color: #6b7280; }
        .now-playing-name {
            color: #fff; font-weight: 600; font-size: 0.9rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* SIDEBAR */
        .replay-sidebar {
            width: 100%; background: #2c2e31; border-radius: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden;
        }
        @media (min-width: 768px) {
            .replay-sidebar {
                width: 340px; flex-shrink: 0;
                position: sticky; top: 72px;
                max-height: calc(100vh - 88px);
            }
        }

        .sidebar-header {
            padding: 16px 18px; border-bottom: 1px solid #374151;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-header h2 { color: #fff; font-size: 0.95rem; font-weight: 700; }
        .sidebar-count {
            margin-left: auto; font-size: 11px; color: #9ca3af;
            background: #1e2124; border-radius: 999px; padding: 2px 10px;
        }

        .replay-list {
            overflow-y: auto; flex: 1; padding: 12px;
            display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(239,68,68,0.6) rgba(255,255,255,0.04);
        }
        .replay-list::-webkit-scrollbar { width: 6px; }
        .replay-list::-webkit-scrollbar-track { background: transparent; }
        .replay-list::-webkit-scrollbar-thumb { background: rgba(239,68,68,0.6); border-radius: 999px; }

        /* REPLAY CARD */
        .replay-card {
            border: 1px solid rgba(255,255,255,0.07);
            background: linear-gradient(180deg, rgba(72,76,78,0.25) 0%, rgba(44,46,49,0.85) 100%);
            border-radius: 14px; cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, background 0.2s;
            overflow: hidden;
        }
        .replay-card:hover {
            border-color: rgba(239,68,68,0.5); transform: translateY(-1px);
            background: linear-gradient(180deg, rgba(127,29,29,0.3) 0%, rgba(44,46,49,0.9) 100%);
        }
        .replay-card.active {
            border-color: rgba(239,68,68,0.8);
            background: linear-gradient(180deg, rgba(127,29,29,0.4) 0%, rgba(44,46,49,0.95) 100%);
        }
        .replay-card-inner { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
        .replay-thumb { width: 80px; height: 45px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #111; }
        .replay-card-info { flex: 1; min-width: 0; }
        .replay-card-title {
            color: #fff; font-weight: 600; font-size: 0.82rem; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .replay-card-meta { font-size: 11px; color: #6b7280; margin-top: 3px; }
        .replay-card.active .replay-card-title { color: #fca5a5; }
        .replay-card.active .replay-card-meta { color: #ef4444; }
        .play-icon { color: #6b7280; font-size: 0.75rem; flex-shrink: 0; transition: color 0.2s; }
        .replay-card:hover .play-icon, .replay-card.active .play-icon { color: #ef4444; }

        /* FOOTER */
        footer {
            background: #2c2e31; border-top: 1px solid #374151;
            text-align: center; padding: 16px; font-size: 12px; color: #4b5563;
        }
    </style>
</head>
<body>

    <header>
        <h1>JKT48 <span>Replay Theater</span></h1>
    </header>

    <main>
        <!-- Player -->
        <div class="player-section">
            <div class="player-shell">
                <div class="player-stage" id="playerStage">
                    <media-player id="replayPlayer" class="replay-media-player"
                        view-type="video" stream-type="on-demand" playsinline crossorigin>
                        <media-provider></media-provider>
                        <media-video-layout small-layout-when="never"></media-video-layout>
                        <div id="mobileTapTarget"></div>
                        <div id="watermark">JKT48 Replay</div>
                    </media-player>

                    <div id="playerOverlay" class="player-overlay">
                        <div class="overlay-title" id="overlayTitle">Pilih replay dari daftar →</div>
                        <button id="overlayPlayButton" class="overlay-play" type="button" aria-label="Putar replay">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>

                <div class="now-playing">
                    <div class="now-playing-dot idle" id="nowDot"></div>
                    <div class="now-playing-text">
                        <div class="now-playing-label idle" id="nowLabel">Belum Diputar</div>
                        <div class="now-playing-name" id="nowName">Pilih replay dari daftar</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="replay-sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-film" style="color:#ef4444; font-size:0.9rem;"></i>
                <h2>Daftar Replay</h2>
                <span class="sidebar-count">2 video</span>
            </div>
            <div class="replay-list" id="replayList"></div>
        </aside>
    </main>

    <footer>
        JKT48 Request Hour 2026 &mdash; Replay Theater
    </footer>

    <!-- Vidstack -->
    <script type="module" src="https://cdn.vidstack.io/player"></script>

    <script>
    // ── DATA ──────────────────────────────────────────────────────────────────
    const REPLAYS = [
        { id: "MSpvZ_eVqlk", title: "JKT48 Request Hour 2026 SHOW 1", meta: "Request Hour 2026" },
        { id: "WGxUOXgPz60", title: "JKT48 Request Hour 2026 SHOW 2", meta: "Request Hour 2026" }
    ];

    let currentIndex = null;

    const player  = document.getElementById("replayPlayer");
    const overlay = document.getElementById("playerOverlay");

    function getThumb(id) { return `https://img.youtube.com/vi/${id}/mqdefault.jpg`; }
    function getYTSrc(id)  { return `youtube/${id}`; }

    // ── RENDER SIDEBAR ────────────────────────────────────────────────────────
    function renderList() {
        const list = document.getElementById("replayList");
        list.innerHTML = "";
        REPLAYS.forEach((r, i) => {
            const card = document.createElement("div");
            card.className = "replay-card" + (currentIndex === i ? " active" : "");
            card.innerHTML = `
                <div class="replay-card-inner">
                    <img class="replay-thumb" src="${getThumb(r.id)}" alt="${r.title}" loading="lazy">
                    <div class="replay-card-info">
                        <div class="replay-card-title">${r.title}</div>
                        <div class="replay-card-meta">${r.meta}</div>
                    </div>
                    <i class="fa-solid ${currentIndex === i ? 'fa-circle-play' : 'fa-play'} play-icon"></i>
                </div>`;
            card.addEventListener("click", () => loadReplay(i));
            list.appendChild(card);
        });
    }

    // ── LOAD REPLAY ───────────────────────────────────────────────────────────
    function loadReplay(index) {
        currentIndex = index;
        const r = REPLAYS[index];

        // Set Vidstack src (youtube/ prefix)
        player.src = getYTSrc(r.id);

        // Update overlay title & hide overlay
        document.getElementById("overlayTitle").textContent = r.title;
        overlay.classList.remove("hidden");

        // Update now playing bar
        document.getElementById("nowDot").classList.remove("idle");
        document.getElementById("nowLabel").classList.remove("idle");
        document.getElementById("nowLabel").textContent = "Now Playing";
        document.getElementById("nowName").textContent  = r.title;

        renderList();

        // Try to play after Vidstack loads the source
        setTimeout(() => { player.play().catch(() => {}); }, 300);
    }

    // ── OVERLAY PLAY BUTTON ───────────────────────────────────────────────────
    let overlayRemoved = false;

    function removeOverlayPermanently() {
        if (!overlayRemoved) { overlayRemoved = true; overlay.remove(); }
    }

    player.addEventListener("play", () => {
        overlay.classList.add("hidden");
        setTimeout(removeOverlayPermanently, 300);
    });

    document.getElementById("overlayPlayButton").addEventListener("click", (e) => {
        e.stopPropagation();
        if (currentIndex === null) {
            loadReplay(0);
        } else {
            player.play().catch(() => {});
        }
    });

    // Spacebar play/pause
    document.addEventListener("keydown", (e) => {
        if ((e.code === "Space" || e.key === " ") && player && player.src) {
            e.preventDefault();
            e.stopImmediatePropagation();
            player.paused ? player.play().catch(() => {}) : player.pause();
        }
    }, true);

    // ── MOBILE FULLSCREEN TAP FIX ─────────────────────────────────────────────
    const mobileTap = document.getElementById("mobileTapTarget");

    function isMobileUA() {
        return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
               || window.innerWidth <= 768;
    }
    function syncMobileTap() {
        const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        mobileTap.style.display = (isMobileUA() && inFs) ? "block" : "none";
    }
    mobileTap.addEventListener("touchend", (e) => {
        e.preventDefault(); e.stopPropagation();
        player.paused ? player.play().catch(() => {}) : player.pause();
    }, { passive: false });
    document.addEventListener("fullscreenchange",       syncMobileTap);
    document.addEventListener("webkitfullscreenchange", syncMobileTap);

    // ── WATERMARK ─────────────────────────────────────────────────────────────
    const watermark     = document.getElementById("watermark");
    const SHOW_DURATION = 10000;
    const HIDE_DURATION = 5 * 60 * 1000;
    let watermarkHideTimeout, watermarkTimeout, isWatermarkActive = false;

    function isMobileDevice() {
        return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
               || window.innerWidth < 768;
    }
    function applyResponsiveStyle() {
        watermark.style.fontSize   = isMobileDevice() ? "14px" : "18px";
        watermark.style.textShadow = isMobileDevice()
            ? "1px 1px 4px rgba(0,0,0,0.8)"
            : "2px 2px 4px rgba(0,0,0,0.8)";
    }
    function getRandomPosition() {
        const pw = player.offsetWidth  || 640;
        const ph = player.offsetHeight || 360;
        const ww = watermark.offsetWidth  || 160;
        const wh = watermark.offsetHeight || 24;
        const pad = 20;
        return {
            x: pad + Math.random() * Math.max(pad, pw - ww - pad * 2),
            y: pad + Math.random() * Math.max(pad, ph - wh - pad * 2)
        };
    }
    function positionWatermark() {
        const pos = getRandomPosition();
        watermark.style.left = pos.x + "px";
        watermark.style.top  = pos.y + "px";
    }
    function showWatermark() {
        clearTimeout(watermarkHideTimeout);
        clearTimeout(watermarkTimeout);
        applyResponsiveStyle();
        watermark.style.display = "block";
        isWatermarkActive = true;
        positionWatermark();
        watermarkHideTimeout = setTimeout(() => {
            watermark.style.display = "none";
            isWatermarkActive = false;
            watermarkTimeout = setTimeout(showWatermark, HIDE_DURATION);
        }, SHOW_DURATION);
    }
    function onFullscreenChange() {
        if (isWatermarkActive) setTimeout(positionWatermark, 100);
    }
    document.addEventListener("fullscreenchange",       onFullscreenChange);
    document.addEventListener("webkitfullscreenchange", onFullscreenChange);
    document.addEventListener("mozfullscreenchange",    onFullscreenChange);
    window.addEventListener("resize", () => {
        if (isWatermarkActive) { applyResponsiveStyle(); positionWatermark(); }
    });

    showWatermark();

    // ── INIT ──────────────────────────────────────────────────────────────────
    renderList();
    </script>
</body>
</html>

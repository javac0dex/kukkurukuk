<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JKT48 Replay Theater</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: "Segoe UI", sans-serif;
    background: #14171a;
    color: #d1d5db;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-user-select: none;
    user-select: none;
}

input { -webkit-user-select: text; user-select: text; }

/* HEADER */
header {
    background: #2c2e31;
    border-bottom: 1px solid #374151;
    padding: 12px 24px;
    position: sticky;
    top: 0;
    z-index: 30;
    display: flex;
    align-items: center;
}

header h1 {
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
}

header span {
    color: #ef4444;
}

/* MAIN LAYOUT */
main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 20px 16px;
    max-width: 1280px;
    margin: 0 auto;
    width: 100%;
}

@media (min-width: 768px) {
    main {
        flex-direction: row;
        align-items: flex-start;
        padding: 24px 24px;
    }
}

/* PLAYER SECTION */
.player-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
}

.player-shell {
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #374151;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    background:
        radial-gradient(circle at top left, rgba(239,68,68,0.2), transparent 32%),
        radial-gradient(circle at top right, rgba(125,58,41,0.24), transparent 26%),
        linear-gradient(180deg, #1a1d20 0%, #101214 100%);
}

.player-stage {
    position: relative;
    background: #000;
    aspect-ratio: 16 / 9;
}

#ytPlayer {
    width: 100%;
    height: 100%;
    display: block;
    border: none;
}

/* OVERLAY */
.player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.82) 100%);
    transition: opacity 0.25s ease, visibility 0.25s ease;
    flex-direction: column;
    gap: 16px;
}

.player-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

.overlay-title {
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    padding: 0 24px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

.overlay-play {
    width: 78px;
    height: 78px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(239,68,68,0.92);
    color: #fff;
    font-size: 1.5rem;
    box-shadow: 0 24px 50px rgba(0,0,0,0.35);
    transition: transform 0.2s ease, background 0.2s ease;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.overlay-play:hover {
    transform: scale(1.06);
    background: rgba(220,38,38,0.98);
}

/* NOW PLAYING BAR */
.now-playing {
    background: #1e2124;
    border: 1px solid #374151;
    border-top: none;
    border-radius: 0 0 20px 20px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 58px;
}

.now-playing-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #ef4444;
    flex-shrink: 0;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.now-playing-dot.idle {
    background: #4b5563;
    animation: none;
}

.now-playing-text {
    flex: 1;
    min-width: 0;
}

.now-playing-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #ef4444;
    font-weight: 700;
}

.now-playing-label.idle {
    color: #6b7280;
}

.now-playing-name {
    color: #fff;
    font-weight: 600;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* SIDEBAR */
.replay-sidebar {
    width: 100%;
    background: #2c2e31;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    overflow: hidden;
}

@media (min-width: 768px) {
    .replay-sidebar {
        width: 340px;
        flex-shrink: 0;
        position: sticky;
        top: 72px;
        max-height: calc(100vh - 88px);
    }
}

.sidebar-header {
    padding: 16px 18px;
    border-bottom: 1px solid #374151;
    display: flex;
    align-items: center;
    gap: 8px;
}

.sidebar-header h2 {
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
}

.sidebar-count {
    margin-left: auto;
    font-size: 11px;
    color: #9ca3af;
    background: #1e2124;
    border-radius: 999px;
    padding: 2px 10px;
}

.replay-list {
    overflow-y: auto;
    flex: 1;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(239,68,68,0.6) rgba(255,255,255,0.04);
}

.replay-list::-webkit-scrollbar { width: 6px; }
.replay-list::-webkit-scrollbar-track { background: transparent; }
.replay-list::-webkit-scrollbar-thumb {
    background: rgba(239,68,68,0.6);
    border-radius: 999px;
}

/* REPLAY CARD */
.replay-card {
    border: 1px solid rgba(255,255,255,0.07);
    background: linear-gradient(180deg, rgba(72,76,78,0.25) 0%, rgba(44,46,49,0.85) 100%);
    border-radius: 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    overflow: hidden;
}

.replay-card:hover {
    border-color: rgba(239,68,68,0.5);
    transform: translateY(-1px);
    background: linear-gradient(180deg, rgba(127,29,29,0.3) 0%, rgba(44,46,49,0.9) 100%);
}

.replay-card.active {
    border-color: rgba(239,68,68,0.8);
    background: linear-gradient(180deg, rgba(127,29,29,0.4) 0%, rgba(44,46,49,0.95) 100%);
}

.replay-card-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
}

.replay-thumb {
    width: 80px;
    height: 45px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: #111;
}

.replay-card-info {
    flex: 1;
    min-width: 0;
}

.replay-card-title {
    color: #fff;
    font-weight: 600;
    font-size: 0.82rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.replay-card-meta {
    font-size: 11px;
    color: #6b7280;
    margin-top: 3px;
}

.replay-card.active .replay-card-title { color: #fca5a5; }
.replay-card.active .replay-card-meta { color: #ef4444; }

.play-icon {
    color: #6b7280;
    font-size: 0.75rem;
    flex-shrink: 0;
    transition: color 0.2s;
}

.replay-card:hover .play-icon,
.replay-card.active .play-icon {
    color: #ef4444;
}

/* FOOTER */
footer {
    background: #2c2e31;
    border-top: 1px solid #374151;
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: #4b5563;
}
    </style>
</head>
<body>

    <header>
        <h1>JKT48 <span>Replay Theater</span></h1>
    </header>

    <main>
        <!-- Player -->
        <div class="player-section">
            <div class="player-shell">
                <div class="player-stage">
                    <iframe
                        id="ytPlayer"
                        src=""
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen
                    ></iframe>
                    <div id="playerOverlay" class="player-overlay">
                        <div class="overlay-title">Pilih replay dari daftar →</div>
                        <button id="overlayPlayButton" class="overlay-play" type="button" aria-label="Putar replay">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>
                <div class="now-playing" id="nowPlayingBar">
                    <div class="now-playing-dot idle" id="nowDot"></div>
                    <div class="now-playing-text">
                        <div class="now-playing-label idle" id="nowLabel">Belum Diputar</div>
                        <div class="now-playing-name" id="nowName">Pilih replay dari daftar</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="replay-sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-film" style="color:#ef4444; font-size:0.9rem;"></i>
                <h2>Daftar Replay</h2>
                <span class="sidebar-count" id="replayCount">2 video</span>
            </div>
            <div class="replay-list" id="replayList"></div>
        </aside>
    </main>

    <footer>
        JKT48 Request Hour 2026 &mdash; Replay Theater
    </footer>

    <script>
const REPLAYS = [
    {
        id: "MSpvZ_eVqlk",
        title: "JKT48 Request Hour 2026 SHOW 1",
        meta: "Request Hour 2026"
    },
    {
        id: "WGxUOXgPz60",
        title: "JKT48 Request Hour 2026 SHOW 2",
        meta: "Request Hour 2026"
    }
];

let currentIndex = null;

function getThumb(id) {
    return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

function getEmbedUrl(id) {
    return `https://www.youtube.com/embed/watch?v=${id}&autoplay=1&rel=0`;
}

function renderList() {
    const list = document.getElementById("replayList");
    list.innerHTML = "";
    REPLAYS.forEach((r, i) => {
        const card = document.createElement("div");
        card.className = "replay-card" + (currentIndex === i ? " active" : "");
        card.innerHTML = `
            <div class="replay-card-inner">
                <img class="replay-thumb" src="${getThumb(r.id)}" alt="${r.title}" loading="lazy">
                <div class="replay-card-info">
                    <div class="replay-card-title">${r.title}</div>
                    <div class="replay-card-meta">${r.meta}</div>
                </div>
                <i class="fa-solid ${currentIndex === i ? 'fa-circle-play' : 'fa-play'} play-icon"></i>
            </div>
        `;
        card.addEventListener("click", () => loadReplay(i));
        list.appendChild(card);
    });
}

function loadReplay(index) {
    currentIndex = index;
    const r = REPLAYS[index];

    // Embed YouTube with autoplay
    document.getElementById("ytPlayer").src = getEmbedUrl(r.id);

    // Hide overlay
    document.getElementById("playerOverlay").classList.add("hidden");

    // Update now playing
    document.getElementById("nowDot").classList.remove("idle");
    document.getElementById("nowLabel").classList.remove("idle");
    document.getElementById("nowLabel").textContent = "Now Playing";
    document.getElementById("nowName").textContent = r.title;

    // Re-render list to update active state
    renderList();
}

// Overlay play button — play first if none selected, else replay current
document.getElementById("overlayPlayButton").addEventListener("click", () => {
    if (currentIndex === null) {
        loadReplay(0);
    } else {
        loadReplay(currentIndex);
    }
});

// Init
renderList();
    </script>
</body>
</html>
